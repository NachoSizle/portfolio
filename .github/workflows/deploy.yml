name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 7 * * 1" # rebuild semanal (lunes 07:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys solapados a Pages: encola el siguiente y deja terminar el actual.
concurrency:
  group: portfolio-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Astro cache
        uses: actions/cache@v4
        with:
          path: .astro-cache
          key: astro-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Astro type/content check
        run: bun run check

      - name: Build & Upload with Astro Action
        uses: withastro/action@v4
        with:
          package-manager: bun@latest

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
