name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Check · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Astro cache
        uses: actions/cache@v4
        with:
          path: .astro-cache
          key: astro-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check (Biome)
        run: bun run format:check

      - name: Lint (Biome)
        run: bun run lint

      - name: Astro type/content check
        run: bun run check

      - name: Run tests (Vitest)
        run: bun run test

      - name: Build
        run: bun run build
